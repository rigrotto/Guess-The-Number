<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess the Number</title>

  <style>
    body {
      margin: 0;
      background: #ffffff;
      font-family: monospace;
      display: flex;
      justify-content: center;
      padding: 40px;
      color: #111;
    }

    pre {
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      background: #111;
      margin-left: 2px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>
</head>

<body>
  <pre id="output"></pre><span class="cursor"></span>

  <script>
function guessTheNumber() {
  const secretNumber = Math.floor(Math.random() * 100) + 1;
  let attempts = 0;

  alert("Welcome to Guess the Number!\nI'm thinking of a number between 1 and 100. Can you guess it?");

  while (true) {
    let guess = prompt("Take a guess:");

    if (guess === null) return; // user cancelled

    guess = Number(guess);
    attempts++;

    if (guess < secretNumber) {
      alert("Too low! Try again.");
    } else if (guess > secretNumber) {
      alert("Too high! Try again.");
    } else {
      alert(`Congratulations! You guessed the number in ${attempts} attempts.`);
      break;
    }
  }
}

guessTheNumber();
</script>
</body>
</html>
