<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess the Number</title>

  <style>
    body {
      margin: 0;
      background: #ffffff;
      font-family: monospace;
      display: flex;
      justify-content: center;
      padding: 40px;
      color: #111;
    }

    pre {
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      background: #111;
      margin-left: 2px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>
</head>

<body>
  <pre id="output"></pre><span class="cursor"></span>

  <script>
    const output = document.getElementById("output");

    let secretNumber = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;

    const lines = [
      "Welcome to Guess the Number!",
      "I'm thinking of a number between 1 and 100. Can you guess it?",
      ""
    ];

    const gameLines = [];

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function print(text) {
      output.textContent += text + "\n";
    }

    async function typeLines(arr, delay = 700) {
      for (let line of arr) {
        print(line);
        await sleep(delay);
      }
    }

    async function gameLoop() {
      await typeLines(lines, 800);

      while (true) {
        let guess = Number(prompt("Take a guess:"));
        attempts++;

        gameLines.push("Take a guess: " + guess);

        if (guess < secretNumber) {
          gameLines.push("Too low! Try again.\n");
        } 
        else if (guess > secretNumber) {
          gameLines.push("Too high! Try again.\n");
        } 
        else {
          gameLines.push(
            "Congratulations! You guessed the number in " + attempts + " attempts."
          );
          break;
        }

        for (let i = gameLines.length - 2; i < gameLines.length; i++) {
          print(gameLines[i]);
          await sleep(500);
        }
      }
    }

    gameLoop();
  </script>
</body>
</html>
